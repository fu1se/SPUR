syntax = "proto3";

package control.v1;

option go_package = "github.com/fu1se/localizator/internal/adapter/controlproto";

// RegisterRequest is sent by a client right after the control-channel QUIC
// handshake completes, to announce its identity to the rendezvous server.
message RegisterRequest {
  bytes public_key = 1; // 32 bytes, Curve25519/WireGuard-compatible
}

// RegisterResponse tells the client how the server sees it, i.e. its
// server-reflexive candidate — the STUN-equivalent part of registration.
message RegisterResponse {
  string peer_id = 1;
  string observed_address = 2; // host:port as seen by the server
}

// Candidate mirrors domain.Candidate on the wire.
message Candidate {
  string kind = 1;    // "host" | "server_reflexive" | "relay"
  string address = 2; // ip:port
}

// PublishCandidatesRequest sends the caller's own candidates for a session,
// identified by a session ID both peers derive independently
// (domain.SessionIDFor) from their two peer IDs.
message PublishCandidatesRequest {
  string session_id = 1;
  string peer_id = 2; // the publisher's own ID
  repeated Candidate candidates = 3;
  bytes public_key = 4; // publisher's identity key — lets the counterpart
                         // derive an end-to-end shared secret (Phase 7),
                         // independent of whatever transport (P2P or relay)
                         // ends up carrying the data
}

message PublishCandidatesResponse {}

// AwaitCandidatesRequest blocks server-side until peer_id's candidates for
// session_id have been published, or the stream's context is cancelled.
message AwaitCandidatesRequest {
  string session_id = 1;
  string peer_id = 2; // whose candidates the caller is waiting for
}

message AwaitCandidatesResponse {
  repeated Candidate candidates = 1;
  bytes public_key = 2; // the awaited peer's identity key, see
                         // PublishCandidatesRequest.public_key
}

// RelayOpenRequest is the only framed message on a relay stream: after the
// server reads it, the rest of the QUIC stream is treated as an opaque
// byte pipe and spliced to the counterpart's stream for the same session.
// There is no RelayOpenResponse — bytes just start flowing once both
// sides of the session have opened their stream.
message RelayOpenRequest {
  string session_id = 1;
}

// MeshMember mirrors domain.MeshMember on the wire.
message MeshMember {
  string peer_id = 1;
  bytes public_key = 2;
  string mesh_ip = 3;
}

// JoinNetworkRequest asks the server to join (or auto-create) a mesh
// network by name. There is no invite-token gating yet (see
// usecase.JoinNetwork's doc comment) — Phase 7.
message JoinNetworkRequest {
  string network_name = 1;
  bytes public_key = 2;
}

message JoinNetworkResponse {
  string cidr = 1;
  repeated MeshMember members = 2; // includes the caller itself
}
