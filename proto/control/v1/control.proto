syntax = "proto3";

package control.v1;

option go_package = "github.com/fu1se/spur/internal/adapter/controlproto";

// RegisterRequest is sent by a client right after the control-channel QUIC
// handshake completes, to announce its identity to the rendezvous server.
message RegisterRequest {
  bytes public_key = 1; // 32 bytes, Curve25519/WireGuard-compatible
  string client_version = 2; // this client's build version (cli.Version()),
                              // "dev" for unreleased/local builds. Purely
                              // informational — lets the server's response
                              // carry its own version back so the client can
                              // warn about a version skew; the server never
                              // rejects a request based on this field.
}

// RegisterResponse tells the client how the server sees it, i.e. its
// server-reflexive candidate — the STUN-equivalent part of registration.
message RegisterResponse {
  string peer_id = 1;
  string observed_address = 2; // host:port as seen by the server
  string server_version = 3; // the server's own build version, so the
                              // client can compare against its own and warn
                              // if they differ — see RegisterRequest.client_version
}

// Candidate mirrors domain.Candidate on the wire.
message Candidate {
  string kind = 1;    // "host" | "server_reflexive" | "relay"
  string address = 2; // ip:port
}

// PublishCandidatesRequest sends the caller's own candidates for a session,
// identified by a session ID both peers derive independently
// (domain.SessionIDFor) from their two peer IDs.
message PublishCandidatesRequest {
  string session_id = 1;
  string peer_id = 2; // the publisher's own ID
  repeated Candidate candidates = 3;
  bytes public_key = 4; // publisher's identity key — lets the counterpart
                         // derive an end-to-end shared secret (Phase 7),
                         // independent of whatever transport (P2P or relay)
                         // ends up carrying the data
  bytes salt = 5; // 32 random bytes, fresh per publish call. Both sides'
                   // salts are combined into the e2e HKDF salt (see
                   // adapter/e2e) so a given peer pair's session key is
                   // unique per session instead of a static function of
                   // their two identity keys alone.
}

message PublishCandidatesResponse {}

// AwaitCandidatesRequest blocks server-side until peer_id's candidates for
// session_id have been published, or the stream's context is cancelled.
message AwaitCandidatesRequest {
  string session_id = 1;
  string peer_id = 2; // whose candidates the caller is waiting for
}

message AwaitCandidatesResponse {
  repeated Candidate candidates = 1;
  bytes public_key = 2; // the awaited peer's identity key, see
                         // PublishCandidatesRequest.public_key
  bytes salt = 3; // the awaited peer's salt, see
                   // PublishCandidatesRequest.salt
}

// RelayOpenRequest is the only framed message on a relay stream: after the
// server reads it, the rest of the QUIC stream is treated as an opaque
// byte pipe and spliced to the counterpart's stream for the same session.
// There is no RelayOpenResponse — bytes just start flowing once both
// sides of the session have opened their stream.
message RelayOpenRequest {
  string session_id = 1;
}

// MeshMember mirrors domain.MeshMember on the wire.
message MeshMember {
  string peer_id = 1;
  bytes public_key = 2;
  string mesh_ip = 3;
}

// JoinNetworkRequest asks the server to join (or auto-create) a mesh
// network by name. invite_token is required to join a network that
// already exists (unless the caller is already a member); creating a new
// one doesn't need it — see usecase.JoinNetwork's doc comment.
message JoinNetworkRequest {
  string network_name = 1;
  bytes public_key = 2;
  string invite_token = 3;
}

message JoinNetworkResponse {
  string cidr = 1;
  repeated MeshMember members = 2; // includes the caller itself
  string invite_token = 3; // share this with whoever should join next
  string error = 4; // non-empty means the join was rejected (e.g. bad
                     // invite token) — cidr/members/invite_token are
                     // meaningless when this is set
}

// RegisterPairingCodeRequest asks the server to mint a short, human-typeable
// code that resolves to the caller's own peer ID for a limited time — lets
// a counterpart address the caller without already knowing its full peer
// ID out of band (see cli's single-command connect flow).
message RegisterPairingCodeRequest {
  bytes public_key = 1;
}

message RegisterPairingCodeResponse {
  string code = 1;
}

// ResolvePairingCodeRequest looks up which peer ID a pairing code refers
// to, and simultaneously tells the server "I am the one connecting" —
// unblocking that code's registrant, who's parked in
// AwaitPairingCodeUseRequest.
message ResolvePairingCodeRequest {
  string code = 1;
  bytes public_key = 2; // the resolver's own identity key, passed on to
                         // whoever is awaiting this code's use
}

message ResolvePairingCodeResponse {
  string peer_id = 1; // empty + error set means the code doesn't exist or
                       // has expired
  string error = 2;
}

// AwaitPairingCodeUseRequest blocks server-side until code has been
// resolved by a counterpart (see ResolvePairingCodeRequest), or the
// stream's context is cancelled / the code expires.
message AwaitPairingCodeUseRequest {
  string code = 1;
}

message AwaitPairingCodeUseResponse {
  string peer_id = 1; // the peer ID of whoever resolved the code
}

// CreateRoomRequest asks the server to create a brand-new, persistent
// room named room_name with the caller as its first (of exactly two)
// member — unlike a pairing code (single-use, expires in minutes) or a
// mesh network (many members, TUN/WireGuard), a room is a long-lived
// pairing between two specific, already-known people who don't want to
// re-exchange a peer ID or code every time they connect. Fails if the
// name is already taken.
message CreateRoomRequest {
  string room_name = 1;
  bytes public_key = 2;
}

message CreateRoomResponse {
  string invite_token = 1; // share with the second participant, who
                            // presents it once in JoinRoomRequest
  string error = 2; // non-empty means creation was rejected (e.g. the
                     // name is already taken) — invite_token is
                     // meaningless when this is set
}

// JoinRoomRequest asks the server to add the caller as the room's second
// member. invite_token must match what CreateRoom returned, unless the
// caller is already a member (idempotent rejoin, same convention as
// JoinNetworkRequest).
message JoinRoomRequest {
  string room_name = 1;
  bytes public_key = 2;
  string invite_token = 3;
}

message JoinRoomResponse {
  string error = 1; // non-empty means the join was rejected (room
                     // doesn't exist, already has two other members, or
                     // invite_token is wrong)
}

// ResolveRoomRequest asks the server who the caller's counterpart is in
// an already-full room — used by connect/expose/send/receive's --room
// flag as an alternative to a peer ID or pairing code.
message ResolveRoomRequest {
  string room_name = 1;
  bytes public_key = 2;
}

message ResolveRoomResponse {
  string peer_id = 1; // the other member's peer ID
  string error = 2; // non-empty means resolution failed (room doesn't
                     // exist, caller isn't a member, or the second
                     // participant hasn't joined yet) — peer_id is
                     // meaningless when this is set
}
